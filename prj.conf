# PSRAM must be initialized to stabilize the MSPI bus on ESP32-S3FH4R2.
# Without it the chip hangs at "spi_flash: flash io: dio".
CONFIG_ESP_SPIRAM=y
CONFIG_SPIRAM_MODE_QUAD=y
CONFIG_SPIRAM_SPEED_40M=y
CONFIG_ESP_SPIRAM_MEMTEST=n
CONFIG_ESP_SPIRAM_HEAP_SIZE=65536

# Use the ROM UART directly for printk — do NOT let Zephyr's UART driver
# replace the arch_printk_char_out hook via the UART console backend.
# This isolates whether the silence is from the UART driver or PSRAM init.
CONFIG_PRINTK=y
CONFIG_UART_CONSOLE=n
CONFIG_LOG=n
CONFIG_CONSOLE=n
