# =========================
# PSRAM
# =========================
CONFIG_ESP_SPIRAM=y
CONFIG_SPIRAM_MODE_QUAD=y
CONFIG_SPIRAM_SPEED_40M=y
CONFIG_ESP_SPIRAM_MEMTEST=n
CONFIG_ESP_SPIRAM_HEAP_SIZE=65536

# =========================
# PRINTK via ROM UART (no inicializar driver UART de Zephyr)
# =========================
CONFIG_PRINTK=y
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n

# =========================
# LOG minimal: redirige LOG_* a printk() sin necesitar UART console
# =========================
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y

# =========================
# GPIO + SPI
# =========================
CONFIG_GPIO=y
CONFIG_SPI=y

# =========================
# UART (driver serial) para el ZE15-CO en UART1.
# La consola/printk NO depende de este driver (va por ROM UART/USB), pero
# CONFIG_UART_CONSOLE/CONSOLE siguen en n para no reasignar uart0.
# Se usa la API de polling (uart_poll_in/out), sin interrupciones.
# =========================
CONFIG_SERIAL=y

# =========================
# LORA + LORAWAN EU868
# =========================
CONFIG_LORA=y
CONFIG_LORA_SX126X=y
CONFIG_LORAWAN=y
CONFIG_LORAWAN_REGION_EU868=y

# =========================
# LORAWAN NVM: persiste el contexto MAC (DevNonce, claves de sesion) en flash.
# Sin esto el DevNonce se reinicia a 0 en cada arranque y el network server
# (anti-replay) descarta los Join-Request ya vistos -> "Rx 2 timeout" / -116.
# lorawan_start() llama internamente a settings_subsys_init() y restaura el
# contexto; usa la storage_partition por defecto del board (no requiere
# cambios en el flash layout).
# =========================
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_LORAWAN_NVM_SETTINGS=y

# =========================
# STACK (LoRaWAN necesita mas que el default)
# =========================
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# =========================
# I2C + BM688 (sensor ambiental)
# CONFIG_I2C es auto-seleccionado por CONFIG_BME680 cuando el
# dispositivo esta en bus I2C, pero se declara explicitamente
# para claridad y compatibilidad.
# =========================
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_BME680=y
